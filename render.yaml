services:
  - type: web
    name: fuelsync-backend
    runtime: node
    branch: main
    rootDir: diet-backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
